<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Dashboard | AttendIQ</title>
  <meta name="description" content="View your attendance details and analytics">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <span class="logo">AttendIQ</span>
          <span class="header-badge">Student</span>
        </div>
        <div class="header-right" id="header-right">
          <!-- Populated by JS -->
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-content">
        <!-- Page Title -->
        <h1 class="page-title">My Attendance Dashboard</h1>
        <p class="page-subtitle">Track your attendance across all subjects</p>

        <!-- Student Profile -->
        <div class="student-profile" id="student-profile">
          <!-- Populated by JS -->
        </div>

        <!-- Stat Cards -->
        <div class="stat-cards" id="stat-cards">
          <!-- Populated by JS -->
        </div>

        <!-- Alerts -->
        <div id="alerts-container" style="margin-bottom: 24px;">
          <!-- Populated by JS -->
        </div>

        <!-- Charts Section -->
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px;">
          <div class="card">
            <div class="card-header">
              <div>
                <h3 class="card-title">Attendance Distribution</h3>
                <p class="card-subtitle">Subject-wise breakdown</p>
              </div>
            </div>
            <div class="chart-container" id="attendance-pie-chart">
              <!-- Populated by JS -->
            </div>
          </div>
          
          <div class="card">
            <div class="card-header">
              <div>
                <h3 class="card-title">Subject Performance</h3>
                <p class="card-subtitle">Attendance by subject code</p>
              </div>
            </div>
            <div class="chart-container" id="subject-bar-chart">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <!-- Subject-wise Attendance -->
        <div class="card">
          <div class="card-header">
            <div>
              <h3 class="card-title">Subject-wise Attendance</h3>
              <p class="card-subtitle">Detailed attendance for each subject</p>
            </div>
          </div>
          <div class="subject-grid" id="subject-attendance">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
