<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Management Dashboard | AttendIQ</title>
  <meta name="description" content="Monitor and manage student attendance across departments">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <header class="dashboard-header">
      <div class="header-content">
        <div class="header-left">
          <span class="logo">AttendIQ</span>
          <span class="header-badge" style="background: rgba(59, 130, 246, 0.1); color: #3b82f6;">Admin</span>
        </div>
        <div class="header-right" id="header-right">
          <!-- Populated by JS -->
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="dashboard-main">
      <div class="dashboard-content">
        <!-- Page Title -->
        <h1 class="page-title">Management Dashboard</h1>
        <p class="page-subtitle">Monitor attendance across all departments and sections</p>

        <!-- Stat Cards -->
        <div class="stat-cards" id="stat-cards">
          <!-- Populated by JS -->
        </div>

        <!-- Insights Grid -->
        <div class="insights-grid" id="insights-grid">
          <!-- Populated by JS -->
        </div>

        <!-- Charts Section -->
        <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 24px;">
          <div class="card">
            <div class="card-header">
              <div>
                <h3 class="card-title">Department Comparison</h3>
                <p class="card-subtitle">Average attendance by department</p>
              </div>
            </div>
            <div class="chart-container" id="department-chart">
              <!-- Populated by JS -->
            </div>
          </div>
          
          <div class="card">
            <div class="card-header">
              <div>
                <h3 class="card-title">Weekly Trends</h3>
                <p class="card-subtitle">Attendance pattern this week</p>
              </div>
            </div>
            <div class="chart-container" id="weekly-trends-chart">
              <!-- Populated by JS -->
            </div>
          </div>
        </div>

        <!-- Student Management Section -->
        <div class="card">
          <div class="card-header">
            <div>
              <h3 class="card-title">Student Attendance Records</h3>
              <p class="card-subtitle" id="student-count">Showing all students</p>
            </div>
          </div>

          <!-- Department Selector -->
          <div class="dept-selector" id="dept-selector">
            <!-- Populated by JS -->
          </div>

          <!-- Filters Bar -->
          <div class="filters-bar">
            <div class="search-box">
              <input 
                type="text" 
                id="search-input" 
                placeholder="Search by name or ID..."
              >
            </div>
            
            <div class="filter-group">
              <label>Section:</label>
              <select id="section-selector">
                <!-- Populated by JS -->
              </select>
            </div>

            <div class="filter-tabs">
              <button class="filter-tab active" data-filter="all">All</button>
              <button class="filter-tab" data-filter="at-risk">At Risk</button>
              <button class="filter-tab" data-filter="warning">Warning</button>
              <button class="filter-tab" data-filter="good">Good</button>
            </div>
          </div>

          <!-- Student Table -->
          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th class="sortable" data-sort="name">Student</th>
                  <th class="sortable" data-sort="id">ID</th>
                  <th>Dept-Section</th>
                  <th class="sortable" data-sort="attendance">Overall %</th>
                  <th>Subject-wise</th>
                  <th>Alerts</th>
                </tr>
              </thead>
              <tbody id="student-table-body">
                <!-- Populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/charts.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
